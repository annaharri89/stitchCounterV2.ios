name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: >-
          xcodebuild test
          -project StitchCounter.xcodeproj
          -scheme StitchCounter
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5'
